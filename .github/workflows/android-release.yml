name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: HYDRV

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Prepare release signing
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing. Add release signing secrets before publishing."
              exit 1
            fi
          done
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > release-keystore.jks
          cat > keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/HYDRV/release-keystore.jks
          storePassword=$RELEASE_STORE_PASSWORD
          keyAlias=$RELEASE_KEY_ALIAS
          keyPassword=$RELEASE_KEY_PASSWORD
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Find APK
        id: find_apk
        run: |
          apk_path=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "apk_path=$apk_path" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp "${{ steps.find_apk.outputs.apk_path }}" HYDRV.apk

      - name: Generate release notes
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          repo_root="$(git rev-parse --show-toplevel)"
          {
            echo "# HYDRV ${GITHUB_REF_NAME}"
            echo
            echo "> Android release browsing, kept clean."
            echo
            echo "## Release at a glance"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Version | \`${GITHUB_REF_NAME}\` |"
            echo "| Commit | \`${GITHUB_SHA:0:7}\` |"
            echo "| Signed APK | \`HYDRV.apk\` |"
            echo
            echo "## Changelog"
            echo
            awk -v version="$release_version" '
              $0 ~ "^## \\[" version "\\]" { printing = 1; next }
              printing && $0 ~ "^## \\[" { exit }
              printing { print }
            ' "$repo_root/CHANGELOG.md"
            echo
            echo "## Recent work"
            echo
            git -C "$repo_root" log --pretty=format:'- %s' --no-merges -n 12
            echo
            echo "## Contributors"
            echo
            git -C "$repo_root" shortlog -s --all --no-merges | awk '{ $1=""; sub(/^ /, ""); print "- " $0 }'
            echo
            echo "## Download"
            echo
            echo "- The signed APK is attached to this release as \`HYDRV.apk\`."
          } > "$GITHUB_WORKSPACE/release-notes.md"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: HYDRV-release-apk
          path: HYDRV/HYDRV.apk

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: HYDRV/HYDRV.apk
