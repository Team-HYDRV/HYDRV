name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: HYDRV

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Prepare release signing
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing. Add release signing secrets before publishing."
              exit 1
            fi
          done
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > release-keystore.jks
          cat > keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/HYDRV/release-keystore.jks
          storePassword=$RELEASE_STORE_PASSWORD
          keyAlias=$RELEASE_KEY_ALIAS
          keyPassword=$RELEASE_KEY_PASSWORD
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Find APK
        id: find_apk
        run: |
          apk_path=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "apk_path=$apk_path" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp "${{ steps.find_apk.outputs.apk_path }}" HYDRV.apk

      - name: Generate release notes
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          CROWDIN_REQUIRE_RELEASE_LOOKUP: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          repo_root="$(git rev-parse --show-toplevel)"
          changelog="$repo_root/CHANGELOG.md"
          previous_tag="$(git -C "$repo_root" describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"

          crowdin_contributors="$(
            python3 "$repo_root/.github/scripts/crowdin_contributors.py"
          )"

          extract_section() {
            local section="$1"
            awk -v version="$release_version" -v wanted="$section" '
              BEGIN { in_version=0; in_section=0 }
              $0 ~ "^## \\[" version "\\]" { in_version=1; next }
              in_version && $0 ~ "^## \\[" { exit }
              in_version && $0 ~ "^### " {
                current = substr($0, 5)
                if (current == wanted) {
                  in_section = 1
                  next
                }
                if (in_section) exit
                next
              }
              in_section {
                if ($0 ~ "^### " || $0 ~ "^## \\[") exit
                print
              }
            ' "$changelog" | sed '/^[[:space:]]*$/d'
          }

          write_section() {
            local title="$1"
            local body
            body="$(extract_section "$title")"
            echo "## $title"
            echo
            if [ -n "$body" ]; then
              printf '%s\n' "$body"
            else
              echo "- None"
            fi
            echo
          }

          release_contributors() {
            local range
            if [ -n "$previous_tag" ]; then
              range="${previous_tag}..${GITHUB_REF_NAME}"
            else
              range="${GITHUB_REF_NAME}"
            fi

            local contributors
            contributors="$(git -C "$repo_root" shortlog -s --no-merges "$range" | awk '{ $1=""; sub(/^ /, ""); print "- " $0 }')"
            if [ -n "$contributors" ]; then
              printf '%s\n' "$contributors"
            else
              echo "- No GitHub contributors"
            fi
          }

          {
            write_section Added
            write_section Changed
            write_section Fixed
            write_section "Recent work"
            echo "## Contributors"
            echo
            release_contributors
            if [ -n "$crowdin_contributors" ]; then
              echo
              echo "### Crowdin Contributors"
              echo
              printf '%s\n' "$crowdin_contributors"
            fi
          } > "$GITHUB_WORKSPACE/release-notes.md"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: HYDRV-release-apk
          path: HYDRV/HYDRV.apk

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: HYDRV ${{ github.ref_name }}
          body_path: release-notes.md
          files: HYDRV/HYDRV.apk

      - name: Notify Discord
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          RELEASE_VERSION: ${{ github.ref_name }}
          RELEASE_URL: https://github.com/Team-HYDRV/HYDRV/releases/tag/${{ github.ref_name }}
          APK_URL: https://github.com/Team-HYDRV/HYDRV/releases/latest/download/HYDRV.apk
        run: |
          if [ -z "$DISCORD_RELEASE_WEBHOOK_URL" ]; then
            echo "DISCORD_RELEASE_WEBHOOK_URL is not set; skipping Discord notification."
            exit 0
          fi

          payload=$(cat <<EOF
          {
            "username": "HYDRV Releases",
            "avatar_url": "https://github.com/Team-HYDRV/HYDRV/raw/main/assets/ic_rounded.png",
            "embeds": [
              {
                "title": "HYDRV ${RELEASE_VERSION} is live",
                "url": "${RELEASE_URL}",
                "description": "The latest HYDRV release is out now. Download the APK below or open the release notes for the full changelog.",
                "color": 2263390,
                "fields": [
                  {
                    "name": "Download",
                    "value": "[HYDRV.apk](${APK_URL})",
                    "inline": true
                  },
                  {
                    "name": "Release notes",
                    "value": "[View on GitHub](${RELEASE_URL})",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "HYDRV release automation"
                }
              }
            ]
          }
          EOF
          )

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "$payload" \
            "$DISCORD_RELEASE_WEBHOOK_URL"
