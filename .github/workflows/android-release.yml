name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: HYDRV

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Find APK
        id: find_apk
        run: |
          apk_path=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "apk_path=$apk_path" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          {
            echo "# HYDRV ${GITHUB_REF_NAME}"
            echo
            echo "## Changelog"
            awk -v version="$release_version" '
              $0 ~ "^## \\[" version "\\]" { printing = 1; next }
              printing && $0 ~ "^## \\[" { exit }
              printing { print }
            ' CHANGELOG.md
            echo
            echo "## Recent work"
            git log --pretty=format:'- %s' --no-merges -n 12
            echo
            echo "## Contributors"
            git shortlog -sne --all --no-merges | awk '{ $1=""; sub(/^ /, ""); print "- " $0 }'
            echo
            echo "## Artifact"
            echo "- APK attached to this release"
          } > release-notes.md

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: HYDRV-release-apk
          path: ${{ steps.find_apk.outputs.apk_path }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: ${{ steps.find_apk.outputs.apk_path }}
